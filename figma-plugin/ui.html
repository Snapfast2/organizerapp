<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:        #4ade80;
      --green-dim:    #86efac;
      --green-glow:   rgba(74, 222, 128, 0.15);
      --green-border: rgba(74, 222, 128, 0.2);
      --bg:           #1a1a1a;
      --surface:      #222;
      --text:         #e5e5e5;
      --text-muted:   #888;
      --red:          #f87171;
      --border:       rgba(255,255,255,0.08);
    }

    html, body {
      width: 100%;
      background: var(--bg);
      font-family: 'Inter', -apple-system, sans-serif;
      font-size: 12px;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Layout ── */
    .panel { padding: 12px; display: flex; flex-direction: column; gap: 1px; }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 0 0 10px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 2px;
    }
    .logo {
      width: 24px; height: 24px;
      background: rgba(74,222,128,0.12);
      border: 1px solid var(--green-border);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
      flex-shrink: 0;
    }
    .app-name { font-size: 13px; font-weight: 600; color: var(--text); flex: 1; }
    .version  { font-size: 10px; color: var(--text-muted); }

    /* ── Section label ── */
    .section-label {
      font-size: 10px;
      font-weight: 500;
      color: var(--text-muted);
      padding: 10px 0 4px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    /* ── Action row (main export button) ── */
    .action-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s;
      width: 100%;
      text-align: left;
    }
    .action-row:hover:not(:disabled) {
      background: rgba(255,255,255,0.06);
      border-color: rgba(255,255,255,0.14);
    }
    .action-row:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    .action-icon { font-size: 14px; flex-shrink: 0; }
    .action-text { font-size: 12px; color: var(--green-dim); font-weight: 500; }

    /* ── Option rows ── */
    .option-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      border-radius: 6px;
      border: 1px solid transparent;
      cursor: pointer;
      transition: background 0.12s;
      width: 100%;
      text-align: left;
      background: transparent;
    }
    .option-row:hover { background: rgba(255,255,255,0.04); }

    .checkbox {
      width: 14px; height: 14px;
      border: 1.5px solid rgba(255,255,255,0.25);
      border-radius: 3px;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.12s, background 0.12s;
      font-size: 9px;
      color: #000;
    }
    .checkbox.on {
      background: var(--green);
      border-color: var(--green);
    }

    .option-text { font-size: 11.5px; color: var(--text-muted); }
    .option-text b { color: var(--text); font-weight: 500; }

    /* Quality toggle (pill) */
    .quality-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
    }
    .quality-label { font-size: 11.5px; color: var(--text-muted); flex: 1; }
    .pill {
      display: flex;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 5px;
      overflow: hidden;
    }
    .pill-btn {
      padding: 3px 9px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-family: inherit;
      font-size: 10.5px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
    }
    .pill-btn.active {
      background: var(--green-glow);
      color: var(--green-dim);
    }
    .pill-sep { width: 1px; background: var(--border); }

    /* ── Progress ── */
    .progress-wrap { display: none; padding: 0 10px 4px; }
    .progress-wrap.visible { display: block; }
    .progress-track {
      height: 2px;
      background: rgba(255,255,255,0.07);
      border-radius: 1px;
      overflow: hidden;
      margin-top: 4px;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: var(--green);
      border-radius: 1px;
      transition: width 0.2s ease;
    }
    .progress-label {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 3px;
    }

    /* ── Footer ── */
    .footer {
      padding: 8px 0 0;
      border-top: 1px solid var(--border);
      margin-top: 6px;
    }
    .status-msg {
      font-size: 10.5px;
      color: var(--text-muted);
      text-align: center;
    }
    .status-msg.ok  { color: var(--green); }
    .status-msg.err { color: var(--red); }
  </style>
</head>
<body>
  <div class="panel">

    <!-- Header -->
    <div class="header">
      <div class="logo">🐄</div>
      <span class="app-name">Antigravity</span>
      <span class="version">v0.1</span>
    </div>

    <!-- Actions -->
    <div class="section-label">Actions</div>
    <button class="action-row" id="export-btn">
      <span class="action-icon">✦</span>
      <span class="action-text">Send selection to AE</span>
    </button>

    <!-- Progress -->
    <div class="progress-wrap" id="progress-wrap">
      <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
      <div class="progress-label" id="progress-label">Exporting…</div>
    </div>

    <!-- Options -->
    <div class="section-label">Options</div>

    <div class="quality-wrap">
      <span class="quality-label">Export scale</span>
      <div class="pill">
        <button class="pill-btn active" id="opt-1x" onclick="setScale(1)">1×</button>
        <div class="pill-sep"></div>
        <button class="pill-btn" id="opt-2x" onclick="setScale(2)">2×</button>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <div class="status-msg" id="status">Select a group, then export.</div>
    </div>

  </div>

  <script>
    const btn          = document.getElementById('export-btn');
    const statusEl     = document.getElementById('status');
    const progressWrap = document.getElementById('progress-wrap');
    const progressFill = document.getElementById('progress-fill');
    const progressLabel= document.getElementById('progress-label');
    const opt1x        = document.getElementById('opt-1x');
    const opt2x        = document.getElementById('opt-2x');

    const SERVER = 'http://localhost:3000/api/ae-figma';

    // ── Quality toggle ─────────────────────────────────────────────────────────
    let exportScale = 1;
    function setScale(s) {
      exportScale = s;
      opt1x.classList.toggle('active', s === 1);
      opt2x.classList.toggle('active', s === 2);
    }

    // ── UI helpers ─────────────────────────────────────────────────────────────
    function setStatus(msg, cls) {
      statusEl.textContent = msg;
      statusEl.className = 'status-msg ' + (cls || '');
    }

    function setBusy(busy) {
      btn.disabled = busy;
      if (!busy) { progressWrap.classList.remove('visible'); }
    }

    function setError(msg) {
      setStatus('❌ ' + msg, 'err');
      btn.disabled = false;
      progressWrap.classList.remove('visible');
    }

    function repaint() {
      return new Promise(r => requestAnimationFrame(() => setTimeout(r, 0)));
    }

    function setProgress(done, total, label) {
      const pct = total > 0 ? Math.round((done / total) * 100) : 0;
      progressFill.style.width = pct + '%';
      progressLabel.textContent = label || '';
    }

    // ── Export ─────────────────────────────────────────────────────────────────
    btn.onclick = () => {
      setBusy(true);
      progressWrap.classList.add('visible');
      setProgress(0, 1, 'Starting…');
      setStatus('Exporting…');
      parent.postMessage({ pluginMessage: { type: 'export-selection', scale: exportScale } }, '*');
    };

    // ── Streaming queue ────────────────────────────────────────────────────────
    let queue = Promise.resolve();
    let totalGroups = 0;
    let sentGroups  = 0;
    let exportedGroups = 0;

    function enqueue(fn) {
      queue = queue.then(fn).catch(e => setError(e.message));
    }

    async function post(body) {
      const res = await fetch(SERVER, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (!res.ok) throw new Error('Server error ' + res.status);
      return res.json();
    }

    // ── Messages ───────────────────────────────────────────────────────────────
    onmessage = (event) => {
      const msg = event.data.pluginMessage;
      if (!msg) return;

      if (msg.type === 'export-start') {
        totalGroups = msg.total || 1;
        sentGroups = exportedGroups = 0;
        queue = Promise.resolve();
        enqueue(() => post({ action: 'start', total: totalGroups, documentName: msg.documentName || 'Figma' }));
        return;
      }

      if (msg.type === 'export-progress') {
        exportedGroups++;
        setProgress(exportedGroups, totalGroups * 2, msg.message || 'Exporting…');
        return;
      }

      if (msg.type === 'export-group') {
        const g = msg.group;
        enqueue(async () => {
          sentGroups++;
          setProgress(totalGroups + sentGroups - 0.5, totalGroups * 2, `Sending ${sentGroups}/${totalGroups}…`);
          await repaint();
          await post({ action: 'group', group: g });
          setProgress(totalGroups + sentGroups, totalGroups * 2);
          await repaint();
        });
        return;
      }

      if (msg.type === 'export-done') {
        enqueue(async () => {
          setProgress(totalGroups * 2, totalGroups * 2, 'Finalizing…');
          await repaint();
          await post({ action: 'finalize' });
          setStatus('✅ Ready in Companion!', 'ok');
          progressWrap.classList.remove('visible');
          btn.disabled = false;
        });
        return;
      }

      if (msg.type === 'export-error') {
        setError(msg.message || 'Unknown error');
      }
    };
  </script>
</body>
</html>
