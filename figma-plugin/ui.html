<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:        #4ade80;
      --green-dim:    #86efac;
      --green-glow:   rgba(74, 222, 128, 0.15);
      --green-border: rgba(74, 222, 128, 0.2);
      --bg:           #1a1a1a;
      --surface:      #222;
      --text:         #e5e5e5;
      --muted:        #888;
      --red:          #f87171;
      --amber:        #fbbf24;
      --border:       rgba(255,255,255,0.08);
    }

    html, body {
      width: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: 'Inter', -apple-system, sans-serif;
      font-size: 12px;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    .panel { padding: 8px 10px; display: flex; flex-direction: column; gap: 0; }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 7px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }
    .logo {
      width: 20px; height: 20px;
      background: rgba(74,222,128,0.1);
      border: 1px solid var(--green-border);
      border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; flex-shrink: 0;
    }
    .app-name { font-size: 12px; font-weight: 600; flex: 1; }
    .version  { font-size: 10px; color: var(--muted); }

    /* ── Section ── */
    .section-label {
      font-size: 9px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 7px 0 3px;
    }

    /* ── Action row ── */
    .action-row {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      transition: background 0.1s, border-color 0.1s;
      width: 100%; text-align: left;
      margin-bottom: 2px;
    }
    .action-row:hover:not(:disabled) { background: #2a2a2a; border-color: rgba(255,255,255,0.13); }
    .action-row:disabled { opacity: 0.4; cursor: not-allowed; }
    .action-icon { font-size: 12px; flex-shrink: 0; }
    .action-text { font-size: 11.5px; font-weight: 500; color: var(--green-dim); }

    /* ── Precomp mark button ── */
    .mark-btn {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      transition: background 0.1s, border-color 0.1s;
      width: 100%; text-align: left;
    }
    .mark-btn:hover:not(:disabled) { background: #2a2a2a; border-color: rgba(255,255,255,0.13); }
    .mark-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .mark-btn.active {
      border-color: rgba(251,191,36,0.3);
      background: rgba(251,191,36,0.07);
    }
    .mark-btn.active:hover:not(:disabled) {
      background: rgba(251,191,36,0.12);
      border-color: rgba(251,191,36,0.45);
    }
    .mark-icon { font-size: 11px; flex-shrink: 0; }
    .mark-text { flex: 1; }
    .mark-label { font-size: 11.5px; font-weight: 500; color: var(--text); }
    .mark-sub   { font-size: 10px; color: var(--muted); margin-top: 1px; }
    .mark-sub.has-mark { color: var(--amber); }

    /* ── Quality ── */
    .quality-wrap {
      display: flex; align-items: center; gap: 8px;
      padding: 5px 10px;
    }
    .quality-label { font-size: 11.5px; color: var(--muted); flex: 1; }
    .pill {
      display: flex;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 5px;
      overflow: hidden;
    }
    .pill-btn {
      padding: 3px 9px;
      border: none; background: transparent;
      color: var(--muted);
      font-family: inherit; font-size: 10.5px; font-weight: 600;
      cursor: pointer;
      transition: background 0.1s, color 0.1s;
    }
    .pill-btn.active { background: var(--green-glow); color: var(--green-dim); }
    .pill-sep { width: 1px; background: var(--border); }

    .scale-hint {
      font-size: 9px;
      color: var(--muted);
      text-align: right;
      padding: 1px 10px 0;
      opacity: 0.6;
    }

    /* ── Progress ── */
    .progress-wrap { display: none; padding: 3px 0; }
    .progress-wrap.visible { display: block; }
    .progress-track {
      height: 2px; background: rgba(255,255,255,0.07);
      border-radius: 1px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; width: 0%;
      border-radius: 1px;
      transition: width 0.2s ease;
      /* 3. Shimmer: moving sheen while exporting */
      background: linear-gradient(90deg,
        rgba(74,222,128,0.75) 0%,
        rgba(134,239,172,1)   45%,
        rgba(74,222,128,0.75) 100%);
      background-size: 200% 100%;
      animation: shimmer 1.6s linear infinite;
    }
    .progress-lbl { font-size: 10px; color: var(--muted); margin-top: 3px; }

    /* ── Footer ── */
    .footer {
      padding: 6px 0 0;
      border-top: 1px solid var(--border);
      margin-top: 6px;
    }
    .status-msg { font-size: 10.5px; color: var(--muted); text-align: center; }
    /* 4. Pop-in on success */
    .status-msg.ok  { color: var(--green); animation: pop-in  0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both; }
    /* 5. Shake on error */
    .status-msg.err { color: var(--red);   animation: shake   0.45s ease-out both; }

    /* ── @keyframes ─────────────────────────────────────────────────────── */

    /* 1. ✦ sparkle — gentle pulse + slight rotate */
    @keyframes sparkle-pulse {
      0%, 100% { opacity: 0.55; transform: scale(1)    rotate(0deg);  }
      50%       { opacity: 1;   transform: scale(1.28) rotate(22deg); }
    }

    /* 2. Logo border glow */
    @keyframes logo-glow {
      0%, 100% { box-shadow: 0 0 0px  rgba(74,222,128,0);    }
      50%       { box-shadow: 0 0 10px rgba(74,222,128,0.4); }
    }

    /* 3. Progress shimmer */
    @keyframes shimmer {
      0%   { background-position: -200% 0; }
      100% { background-position:  200% 0; }
    }

    /* 4. Status pop-in (success) */
    @keyframes pop-in {
      0%   { opacity: 0; transform: scale(0.85) translateY(4px); }
      65%  { opacity: 1; transform: scale(1.05) translateY(-1px); }
      100% { opacity: 1; transform: scale(1)    translateY(0);    }
    }

    /* 5. Error shake */
    @keyframes shake {
      0%,100% { transform: translateX(0);   }
      15%      { transform: translateX(-4px); }
      35%      { transform: translateX( 4px); }
      55%      { transform: translateX(-3px); }
      75%      { transform: translateX( 2px); }
      90%      { transform: translateX(-1px); }
    }

    /* Apply always-on animations */
    .action-icon { animation: sparkle-pulse 3s ease-in-out infinite; }
    .logo        { animation: logo-glow     4s ease-in-out infinite; }
  </style>
</head>
<body>
  <div class="panel">

    <!-- Header -->
    <div class="header">
      <div class="logo">🐄</div>
      <span class="app-name">Antigravity</span>
      <span class="version">v0.1</span>
    </div>

    <!-- Actions -->
    <div class="section-label">Actions</div>
    <button class="action-row" id="export-btn">
      <span class="action-icon">✦</span>
      <span class="action-text">Send selection to AE</span>
    </button>

    <!-- Progress -->
    <div class="progress-wrap" id="progress-wrap">
      <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
      <div class="progress-lbl" id="progress-lbl">Exporting…</div>
    </div>

    <!-- Precomp -->
    <div class="section-label">Precomp</div>
    <button class="mark-btn" id="mark-btn" disabled>
      <span class="mark-icon" id="mark-icon">★</span>
      <span class="mark-text">
        <div class="mark-label" id="mark-label">Mark as Precomp</div>
        <div class="mark-sub" id="mark-sub">Select a group first</div>
      </span>
    </button>

    <!-- Options -->
    <div class="section-label">Options</div>
    <div class="quality-wrap">
      <span class="quality-label">Export scale</span>
      <div class="pill">
        <button class="pill-btn active" id="opt-1x" onclick="setScale(1)">1×</button>
        <div class="pill-sep"></div>
        <button class="pill-btn" id="opt-2x" onclick="setScale(2)">2×</button>
      </div>
    </div>
    <div class="scale-hint" id="scale-hint">Fast · AE scale 100%</div>

    <!-- Footer -->
    <div class="footer">
      <div class="status-msg" id="status">Select a group, then export.</div>
    </div>

  </div>

  <script>
    const exportBtn    = document.getElementById('export-btn');
    const markBtn      = document.getElementById('mark-btn');
    const markIcon     = document.getElementById('mark-icon');
    const markLabel    = document.getElementById('mark-label');
    const markSub      = document.getElementById('mark-sub');
    const statusEl     = document.getElementById('status');
    const progressWrap = document.getElementById('progress-wrap');
    const progressFill = document.getElementById('progress-fill');
    const progressLbl  = document.getElementById('progress-lbl');
    const opt1x        = document.getElementById('opt-1x');
    const opt2x        = document.getElementById('opt-2x');
    const scaleHint    = document.getElementById('scale-hint');

    const SERVER = 'http://localhost:3000/api/ae-figma';

    // ── Quality toggle ─────────────────────────────────────────────────────────
    let exportScale = 1;
    function setScale(s) {
      exportScale = s;
      opt1x.classList.toggle('active', s === 1);
      opt2x.classList.toggle('active', s === 2);
      scaleHint.textContent = s === 1
        ? 'Fast · AE scale 100%'
        : 'Sharp · AE scale 50%';
    }

    // ── Selection info from plugin ─────────────────────────────────────────────
    // Updates the precomp button label + state based on what's selected in Figma.
    function updateMarkBtn(total, marked) {
      if (total === 0) {
        markBtn.disabled = true;
        markBtn.classList.remove('active');
        markIcon.textContent = '★';
        markLabel.textContent = 'Mark as Precomp';
        markSub.textContent   = 'Select a group first';
        markSub.className     = 'mark-sub';
        return;
      }

      markBtn.disabled = false;
      const allMarked = marked === total;

      if (allMarked) {
        // All selected are already marked → offer to unmark.
        markBtn.classList.add('active');
        markIcon.textContent  = '★';
        markLabel.textContent = 'Remove Precomp mark';
        markSub.textContent   = `${marked} of ${total} marked — click to remove`;
        markSub.className     = 'mark-sub has-mark';
      } else if (marked > 0) {
        // Mixed state — some marked, some not.
        markBtn.classList.remove('active');
        markIcon.textContent  = '★';
        markLabel.textContent = 'Mark as Precomp';
        markSub.textContent   = `${marked} of ${total} already marked`;
        markSub.className     = 'mark-sub has-mark';
      } else {
        // None marked.
        markBtn.classList.remove('active');
        markIcon.textContent  = '★';
        markLabel.textContent = 'Mark as Precomp';
        markSub.textContent   = `${total} group${total > 1 ? 's' : ''} selected`;
        markSub.className     = 'mark-sub';
      }
    }

    // ── UI helpers ─────────────────────────────────────────────────────────────
    function setStatus(msg, cls) {
      statusEl.textContent = msg;
      // Force-restart CSS animation on every call (even same class).
      statusEl.style.animation = 'none';
      void statusEl.offsetWidth;         // trigger reflow
      statusEl.style.animation = '';
      statusEl.className = 'status-msg ' + (cls || '');
    }

    function setBusy(busy) {
      exportBtn.disabled = busy;
      if (!busy) progressWrap.classList.remove('visible');
    }

    function setError(msg) {
      setStatus('❌ ' + msg, 'err');
      setBusy(false);
    }

    function repaint() {
      return new Promise(r => requestAnimationFrame(() => setTimeout(r, 0)));
    }

    function setProgress(done, total, label) {
      const pct = total > 0 ? Math.round((done / total) * 100) : 0;
      progressFill.style.width = pct + '%';
      if (label) progressLbl.textContent = label;
    }

    // ── Buttons ────────────────────────────────────────────────────────────────
    exportBtn.onclick = () => {
      setBusy(true);
      progressWrap.classList.add('visible');
      setProgress(0, 1, 'Starting…');
      setStatus('Exporting…');
      parent.postMessage({ pluginMessage: { type: 'export-selection', scale: exportScale } }, '*');
    };

    markBtn.onclick = () => {
      parent.postMessage({ pluginMessage: { type: 'mark-precomp' } }, '*');
    };

    // ── Streaming queue ────────────────────────────────────────────────────────
    let queue = Promise.resolve();
    let totalGroups = 0, sentGroups = 0, exportedGroups = 0;

    function enqueue(fn) {
      queue = queue.then(fn).catch(e => setError(e.message));
    }

    async function post(body) {
      const res = await fetch(SERVER, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (!res.ok) throw new Error('Server error ' + res.status);
      return res.json();
    }

    // ── Plugin messages ────────────────────────────────────────────────────────
    onmessage = (event) => {
      const msg = event.data.pluginMessage;
      if (!msg) return;

      // Live selection state from plugin.
      if (msg.type === 'selection-info') {
        updateMarkBtn(msg.total, msg.marked);
        return;
      }

      if (msg.type === 'export-start') {
        totalGroups = msg.total || 1;
        sentGroups = exportedGroups = 0;
        queue = Promise.resolve();
        enqueue(() => post({ action: 'start', total: totalGroups, documentName: msg.documentName || 'Figma' }));
        return;
      }

      if (msg.type === 'export-progress') {
        exportedGroups++;
        setProgress(exportedGroups, totalGroups * 2, msg.message || 'Exporting…');
        return;
      }

      if (msg.type === 'export-group') {
        const g = msg.group;
        enqueue(async () => {
          sentGroups++;
          setProgress(totalGroups + sentGroups - 0.5, totalGroups * 2, `Sending ${sentGroups}/${totalGroups}…`);
          await repaint();
          await post({ action: 'group', group: g });
          setProgress(totalGroups + sentGroups, totalGroups * 2);
          await repaint();
        });
        return;
      }

      if (msg.type === 'export-done') {
        enqueue(async () => {
          setProgress(totalGroups * 2, totalGroups * 2, 'Finalizing…');
          await repaint();
          await post({ action: 'finalize' });
          setStatus('✅ Ready in Companion!', 'ok');
          progressWrap.classList.remove('visible');
          exportBtn.disabled = false;
        });
        return;
      }

      if (msg.type === 'export-error') {
        setError(msg.message || 'Unknown error');
      }
    };
  </script>
</body>
</html>
