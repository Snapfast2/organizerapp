<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:        #4ade80;
      --green-dim:    #86efac;
      --green-glow:   rgba(74, 222, 128, 0.15);
      --green-border: rgba(74, 222, 128, 0.2);
      --bg:           #1a1a1a;
      --surface:      #222;
      --text:         #e5e5e5;
      --muted:        #888;
      --red:          #f87171;
      --amber:        #fbbf24;
      --border:       rgba(255,255,255,0.08);
    }

    html, body {
      width: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: 'Inter', -apple-system, sans-serif;
      font-size: 12px;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    .panel { padding: 8px 10px; display: flex; flex-direction: column; gap: 0; }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 7px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }
    .logo {
      width: 20px; height: 20px;
      background: rgba(74,222,128,0.1);
      border: 1px solid var(--green-border);
      border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; flex-shrink: 0;
    }
    .app-name { font-size: 12px; font-weight: 600; flex: 1; }
    .version  { font-size: 10px; color: var(--muted); }

    /* ── Section ── */
    .section-label {
      font-size: 9px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 7px 0 3px;
    }

    /* ── Action row ── */
    .action-row {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      transition: background 0.1s, border-color 0.1s, transform 0.1s;
      width: 100%; text-align: left;
      margin-bottom: 2px;
    }
    .action-row:hover:not(:disabled) { background: #2a2a2a; border-color: rgba(255,255,255,0.13); }
    .action-row:active:not(:disabled) { transform: scale(0.97); }
    .action-row:disabled { opacity: 0.4; cursor: not-allowed; }
    .action-icon { font-size: 12px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .action-icon svg { width: 14px; height: 14px; fill: var(--green-dim); }
    .action-text { font-size: 11.5px; font-weight: 500; color: var(--green-dim); }
    .hover-arrow {
      opacity: 0; transform: translateX(-4px); transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
      display: inline-block; font-family: monospace; font-size: 10px; font-weight: bold; margin-left: 2px;
    }
    .action-row:hover:not(:disabled) .hover-arrow { opacity: 1; transform: translateX(0); }

    /* ── Precomp mark button ── */
    .mark-btn {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      transition: background 0.1s, border-color 0.1s, transform 0.1s;
      width: 100%; text-align: left;
    }
    .mark-btn:hover:not(:disabled) { background: #2a2a2a; border-color: rgba(255,255,255,0.13); }
    .mark-btn:active:not(:disabled) { transform: scale(0.97); }
    .mark-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .mark-btn.active {
      border-color: rgba(251,191,36,0.3);
      background: rgba(251,191,36,0.07);
    }
    .mark-btn.active:hover:not(:disabled) {
      background: rgba(251,191,36,0.12);
      border-color: rgba(251,191,36,0.45);
    }
    .mark-icon { font-size: 11px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .mark-icon svg { width: 14px; height: 14px; fill: var(--muted); transition: fill 0.1s; }
    .mark-btn.active .mark-icon svg { fill: var(--amber); }
    .mark-text { flex: 1; }
    .mark-label { font-size: 11.5px; font-weight: 500; color: var(--text); }
    .mark-sub   { font-size: 10px; color: var(--muted); margin-top: 1px; }
    .mark-sub.has-mark { color: var(--amber); }

    /* ── Quality ── */
    .quality-wrap {
      display: flex; align-items: center; gap: 8px;
      padding: 5px 10px;
    }
    .quality-label { font-size: 11.5px; color: var(--muted); flex: 1; }
    .pill {
      display: flex; position: relative;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 5px;
    }
    .pill-slider {
      position: absolute; top: 0; left: 0; bottom: 0; width: 50%;
      background: var(--green-glow); border-radius: 4px;
      transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 0;
    }
    .pill.is-2x .pill-slider { transform: translateX(100%); }
    .pill-btn {
      padding: 3px 9px;
      border: none; background: transparent;
      color: var(--muted);
      font-family: inherit; font-size: 10.5px; font-weight: 600;
      cursor: pointer;
      transition: color 0.15s;
      position: relative; z-index: 1; flex: 1;
    }
    .pill-btn.active { color: var(--green-dim); }

    .scale-hint {
      font-size: 9px;
      color: var(--muted);
      text-align: right;
      padding: 1px 10px 0;
      opacity: 0.6;
    }

    /* ── Progress ── */
    .progress-wrap { display: none; padding: 3px 0; }
    .progress-wrap.visible { display: block; }
    .progress-track {
      height: 2px; background: rgba(255,255,255,0.07);
      border-radius: 1px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; width: 0%;
      border-radius: 1px;
      transition: width 0.2s ease;
      /* 3. Shimmer: moving sheen while exporting */
      background: linear-gradient(90deg,
        rgba(74,222,128,0.75) 0%,
        rgba(134,239,172,1)   45%,
        rgba(74,222,128,0.75) 100%);
      background-size: 200% 100%;
      animation: shimmer 1.6s linear infinite;
    }
    .progress-lbl { font-size: 10px; color: var(--muted); margin-top: 3px; }

    /* ── Footer ── */
    .footer {
      padding: 6px 0 0;
      border-top: 1px solid var(--border);
      margin-top: 6px;
    }
    .status-msg { font-size: 10.5px; color: var(--muted); text-align: center; }
    /* 4. Pop-in on success */
    .status-msg.ok  { color: var(--green); animation: pop-in  0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both; }
    /* 5. Shake on error */
    .status-msg.err { color: var(--red);   animation: shake   0.45s ease-out both; }
    
    .status-msg.exporting::after {
      content: '';
      animation: ellipsis 1.5s infinite;
    }

    /* ── @keyframes ─────────────────────────────────────────────────────── */

    @keyframes ellipsis {
      0% { content: ''; }
      25% { content: '.'; }
      50% { content: '..'; }
      75%, 100% { content: '...'; }
    }

    /* 1. AE Logo — gentle pulse */
    @keyframes ae-pulse {
      0%, 100% { opacity: 0.65; transform: scale(1); }
      50%       { opacity: 1;   transform: scale(1.1); }
    }

    /* 2. Logo border glow */
    @keyframes logo-glow {
      0%, 100% { box-shadow: 0 0 0px  rgba(74,222,128,0);    }
      50%       { box-shadow: 0 0 10px rgba(74,222,128,0.4); }
    }

    /* 3. Progress shimmer */
    @keyframes shimmer {
      0%   { background-position: -200% 0; }
      100% { background-position:  200% 0; }
    }

    /* 4. Status pop-in (success) */
    @keyframes pop-in {
      0%   { opacity: 0; transform: scale(0.85) translateY(4px); }
      65%  { opacity: 1; transform: scale(1.05) translateY(-1px); }
      100% { opacity: 1; transform: scale(1)    translateY(0);    }
    }

    /* 5. Error shake */
    @keyframes shake {
      0%,100% { transform: translateX(0);   }
      15%      { transform: translateX(-4px); }
      35%      { transform: translateX( 4px); }
      55%      { transform: translateX(-3px); }
      75%      { transform: translateX( 2px); }
      90%      { transform: translateX(-1px); }
    }

    /* 6. Cow wiggle */
    @keyframes cow-wiggle {
      0%, 100% { transform: rotate(0deg); }
      5%  { transform: rotate(-15deg); }
      15% { transform: rotate(15deg); }
      25% { transform: rotate(-10deg); }
      35% { transform: rotate(0deg); }
    }

    /* Apply always-on animations */
    .action-icon { animation: ae-pulse 3s ease-in-out infinite; display: flex; align-items: center; justify-content: center; }
    .action-icon svg { width: 14px; height: 14px; fill: var(--green-dim); }
    .logo        { animation: logo-glow 4s ease-in-out infinite; }
    .logo svg    { animation: cow-wiggle 6s ease-in-out infinite; transform-origin: center bottom; }
  </style>
</head>
<body>
  <div class="panel">

    <!-- Header -->
    <div class="header">
      <div class="logo">
        <svg viewBox="0 -1.9 40 40" xmlns="http://www.w3.org/2000/svg" style="width: 14px; height: 14px; fill: var(--green-dim);">
          <path d="M34,6.2h-2v-4c0-2.2-1.4-2.9-3.1-1.4l-6.5,5.4h-4.8l-6.5-5.4C9.4,0.4,8,1,8,3.2v4H6a6,6,0,0,0,0,12h.4l1.3,6.4A6.694,6.694,0,0,0,6,29.2a6.957,6.957,0,0,0,7,7h14a6.957,6.957,0,0,0,7-7,7.069,7.069,0,0,0-1.7-4.6l1.3-6.4h.4a6,6,0,0,0,0-12Zm-7,16H11.3l-.8-4H12a2,2,0,0,0,0-4h-2.2a4.457,4.457,0,0,1,.8-2.6A4.154,4.154,0,0,1,14,10.2h12a4.293,4.293,0,0,1,3.4,1.4,3.849,3.849,0,0,1,.8,2.6H28a2,2,0,0,0,0,4h1.5l-.8,4Zm-23-10a2.006,2.006,0,0,1,2-2h.8a8.77,8.77,0,0,0-1,4h0A2.046,2.046,0,0,1,4,12.2Zm23,20h-1v-2a2,2,0,0,0-4,0v2h-4v-2a2,2,0,0,0-4,0v2h-1a3,3,0,0,1,0-6h14a3,3,0,0,1,0,6Zm7.2-18h0a7.674,7.674,0,0,0-1-4h.8a2.006,2.006,0,0,1,2,2A2.046,2.046,0,0,1,34.2,14.2Z"/>
        </svg>
      </div>
      <span class="app-name">MooMotion</span>

    <!-- Actions -->
    <div class="section-label">Actions</div>
    <button class="action-row" id="export-btn">
      <span class="action-icon">
        <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
          <path d="M26.684 17.023c-0.026 0.236-0.039 0.412-0.051 0.524-0.011 0.089-0.084 0.158-0.174 0.162l-0 0c-0.075 0-0.212 0.012-0.412 0.026-0.197 0.023-0.425 0.037-0.656 0.037-0.023 0-0.046-0-0.070-0l0.004 0c-0.287 0-0.588-0.050-0.911-0.050h-3.956c0.051 0.417 0.188 0.793 0.394 1.122l-0.007-0.012c0.221 0.333 0.531 0.592 0.897 0.745l0.013 0.005c0.45 0.198 0.976 0.313 1.527 0.313 0.025 0 0.050-0 0.075-0.001l-0.004 0c0.465-0.009 0.912-0.059 1.345-0.145l-0.049 0.008c0.414-0.054 0.789-0.155 1.143-0.298l-0.031 0.011c0.062-0.049 0.1-0.025 0.1 0.1v1.911c-0.002 0.054-0.012 0.105-0.027 0.152l0.001-0.004c-0.023 0.035-0.052 0.064-0.085 0.087l-0.001 0.001c-0.36 0.163-0.779 0.293-1.216 0.37l-0.032 0.005c-0.479 0.096-1.029 0.152-1.592 0.152-0.063 0-0.126-0.001-0.189-0.002l0.009 0c-0.048 0.001-0.104 0.002-0.161 0.002-0.806 0-1.574-0.161-2.274-0.453l0.039 0.014c-0.627-0.277-1.154-0.68-1.568-1.179l-0.006-0.007c-0.38-0.46-0.675-1.006-0.853-1.602l-0.008-0.033c-0.166-0.545-0.261-1.172-0.261-1.821 0-0.71 0.114-1.393 0.325-2.032l-0.013 0.046c0.213-0.658 0.532-1.227 0.943-1.718l-0.007 0.008c0.409-0.492 0.912-0.892 1.482-1.174l0.026-0.012c0.554-0.247 1.201-0.391 1.881-0.391 0.071 0 0.143 0.002 0.213 0.005l-0.010-0c0.031-0.001 0.068-0.001 0.105-0.001 0.662 0 1.291 0.143 1.857 0.4l-0.028-0.011c0.525 0.231 0.964 0.57 1.305 0.992l0.005 0.006c0.318 0.405 0.573 0.878 0.741 1.39l0.009 0.033c0.15 0.451 0.236 0.97 0.236 1.509 0 0.005 0 0.009-0 0.014v-0.001c0 0.299-0.012 0.562-0.024 0.799zM16.886 22.004h-2.608c-0.005 0-0.011 0.001-0.017 0.001-0.086 0-0.159-0.058-0.182-0.137l-0-0.001-1.023-2.995h-4.642l-0.948 2.945c-0.021 0.101-0.109 0.176-0.214 0.176-0.008 0-0.016-0-0.024-0.001l0.001 0h-2.346c-0.137 0-0.175-0.075-0.137-0.225l4.018-11.52c0.037-0.125 0.075-0.237 0.125-0.387 0.048-0.242 0.075-0.52 0.075-0.804 0-0.002 0-0.005 0-0.007v0c-0.001-0.005-0.001-0.010-0.001-0.016 0-0.060 0.043-0.11 0.1-0.121l0.001-0h3.232c0.087 0 0.15 0.037 0.162 0.1l4.555 12.791c0.037 0.137 0.001 0.201-0.125 0.201zM25.672 1.399h-19.343c-0.001 0-0.003 0-0.004 0-2.927 0-5.299 2.373-5.299 5.299 0 0.002 0 0.003 0 0.005v-0 18.594c0 0.001 0 0.003 0 0.004 0 2.927 2.373 5.299 5.299 5.299 0.002 0 0.003 0 0.005 0h19.343c0.001 0 0.003 0 0.004 0 2.927 0 5.299-2.373 5.299-5.299 0-0.002 0-0.003 0-0.005v0-18.594c0-0.001 0-0.003 0-0.004 0-2.927-2.373-5.299-5.299-5.299-0.002 0-0.003 0-0.005 0h0zM22.39 14.053c-0.029-0.002-0.064-0.003-0.098-0.003-0.676 0-1.263 0.382-1.557 0.942l-0.005 0.010c-0.138 0.261-0.235 0.564-0.273 0.886l-0.001 0.012h2.632c0.324 0 0.562 0 0.711-0.012 0.108-0.009 0.206-0.045 0.289-0.101l-0.002 0.001v-0.125c0-0 0-0.001 0-0.001 0-0.165-0.028-0.323-0.079-0.471l0.003 0.010c-0.218-0.672-0.838-1.149-1.57-1.149-0.018 0-0.035 0-0.053 0.001l0.003-0zM11.682 14.415c-0.125-0.387-0.237-0.761-0.362-1.148s-0.237-0.749-0.337-1.111c-0.1-0.349-0.187-0.674-0.275-0.973h-0.025c-0.135 0.651-0.281 1.191-0.455 1.718l0.031-0.108c-0.187 0.599-0.374 1.223-0.574 1.847-0.162 0.636-0.362 1.223-0.549 1.747h3.17c-0.075-0.262-0.175-0.574-0.287-0.899-0.112-0.337-0.225-0.699-0.337-1.073z"></path>
        </svg>
      </span>
      <span class="action-text">Send selection to AE <span class="hover-arrow">→</span></span>
    </button>

    <!-- Progress -->
    <div class="progress-wrap" id="progress-wrap">
      <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
      <div class="progress-lbl" id="progress-lbl">Exporting…</div>
    </div>

    <!-- Precomp -->
    <div class="section-label">Precomp</div>
    <button class="mark-btn" id="mark-btn" disabled>
      <span class="mark-icon" id="mark-icon">
        <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg"><path d="M16 0c8.837 0 16 7.163 16 16s-7.163 16-16 16S0 24.837 0 16 7.163 0 16 0zM8.466 16.207a.706.706 0 00-.716.698v3.253c0 .583.311 1.124.82 1.43l7.165 4.289c.134.08.29.123.449.123a.845.845 0 00.854-.84v-3.37c0-.498-.27-.957-.71-1.207l-7.502-4.281a.731.731 0 00-.36-.095zm3.43-5.172a.706.706 0 00-.717.698v4.287l6.59 3.857c.432.253.695.71.695 1.2v3.799a.29.29 0 00.067-.027l1.642-.904a.554.554 0 00.29-.486v-6.84a1.396 1.396 0 00-.709-1.208l-7.5-4.281a.731.731 0 00-.358-.095zm3.64-4.94a.725.725 0 00-.977.252.708.708 0 00-.096.352v4.066l6.736 3.953c.429.253.693.708.693 1.2v6.955l1.557-.823a.564.564 0 00.301-.491v-9.991c0-.498-.27-.96-.711-1.21z"/></svg>
      </span>
      <div class="mark-text">
        <div class="mark-label" id="mark-label">Mark as Precomp</div>
        <div class="mark-sub" id="mark-sub">Select a group first</div>
      </div>
    </button>

    <!-- Options -->
    <div class="section-label">Options</div>
    <div class="quality-wrap">
      <span class="quality-label">Export scale</span>
      <div class="pill" id="scale-pill">
        <div class="pill-slider"></div>
        <button class="pill-btn active" id="opt-1x" onclick="setScale(1)">1×</button>
        <button class="pill-btn" id="opt-2x" onclick="setScale(2)">2×</button>
      </div>
    </div>
    <div class="scale-hint" id="scale-hint">Fast · AE scale 100%</div>

    <!-- Footer -->
    <div class="footer">
      <div class="status-msg" id="status">Select a group, then export.</div>
    </div>

  </div>

  <script>
    const exportBtn    = document.getElementById('export-btn');
    const markBtn      = document.getElementById('mark-btn');
    const markIcon     = document.getElementById('mark-icon');
    const markLabel    = document.getElementById('mark-label');
    const markSub      = document.getElementById('mark-sub');
    const statusEl     = document.getElementById('status');
    const progressWrap = document.getElementById('progress-wrap');
    const progressFill = document.getElementById('progress-fill');
    const progressLbl  = document.getElementById('progress-lbl');
    const opt1x        = document.getElementById('opt-1x');
    const opt2x        = document.getElementById('opt-2x');
    const scaleHint    = document.getElementById('scale-hint');

    const SERVER = 'http://localhost:3000/api/ae-figma';

    // ── Quality toggle ─────────────────────────────────────────────────────────
    let exportScale = 1;
    const scalePill = document.getElementById('scale-pill');

    function setScale(scale) {
      exportScale = scale;
      document.getElementById('opt-1x').classList.toggle('active', scale === 1);
      document.getElementById('opt-2x').classList.toggle('active', scale === 2);
      scalePill.classList.toggle('is-2x', scale === 2);
      scaleHint.textContent = scale === 1 ? 'Fast · AE scale 100%' : 'High Quality · AE scale 50%';
    }

    // ── Selection info from plugin ─────────────────────────────────────────────
    // Updates the precomp button label + state based on what's selected in Figma.
    function updateMarkBtn(total, marked) {
      const svgIcon = `<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg"><path d="M16 0c8.837 0 16 7.163 16 16s-7.163 16-16 16S0 24.837 0 16 7.163 0 16 0zM8.466 16.207a.706.706 0 00-.716.698v3.253c0 .583.311 1.124.82 1.43l7.165 4.289c.134.08.29.123.449.123a.845.845 0 00.854-.84v-3.37c0-.498-.27-.957-.71-1.207l-7.502-4.281a.731.731 0 00-.36-.095zm3.43-5.172a.706.706 0 00-.717.698v4.287l6.59 3.857c.432.253.695.71.695 1.2v3.799a.29.29 0 00.067-.027l1.642-.904a.554.554 0 00.29-.486v-6.84a1.396 1.396 0 00-.709-1.208l-7.5-4.281a.731.731 0 00-.358-.095zm3.64-4.94a.725.725 0 00-.977.252.708.708 0 00-.096.352v4.066l6.736 3.953c.429.253.693.708.693 1.2v6.955l1.557-.823a.564.564 0 00.301-.491v-9.991c0-.498-.27-.96-.711-1.21z"/></svg>`;

      if (total === 0) {
        markBtn.disabled = true;
        markBtn.classList.remove('active');
        markIcon.innerHTML = svgIcon;
        markLabel.textContent = 'Mark as Precomp';
        markSub.textContent   = 'Select a group first';
        markSub.className     = 'mark-sub';
        return;
      }

      markBtn.disabled = false;
      const allMarked = marked === total;

      if (allMarked) {
        // All selected are already marked → offer to unmark.
        markBtn.classList.add('active');
        markIcon.innerHTML = svgIcon;
        markLabel.textContent = 'Remove Precomp mark';
        markSub.textContent   = `${marked} of ${total} marked — click to remove`;
        markSub.className     = 'mark-sub has-mark';
      } else if (marked > 0) {
        // Mixed state — some marked, some not.
        markBtn.classList.remove('active');
        markIcon.innerHTML = svgIcon;
        markLabel.textContent = 'Mark as Precomp';
        markSub.textContent   = `${marked} of ${total} already marked`;
        markSub.className     = 'mark-sub has-mark';
      } else {
        // None marked.
        markBtn.classList.remove('active');
        markIcon.innerHTML = svgIcon;
        markLabel.textContent = 'Mark as Precomp';
        markSub.textContent   = `${total} group${total > 1 ? 's' : ''} selected`;
        markSub.className     = 'mark-sub';
      }
    }

    // ── UI helpers ─────────────────────────────────────────────────────────────
    function setStatus(msg, cls) {
      statusEl.textContent = msg;
      // Force-restart CSS animation on every call (even same class).
      statusEl.style.animation = 'none';
      void statusEl.offsetWidth;         // trigger reflow
      statusEl.style.animation = '';
      statusEl.className = 'status-msg ' + (cls || '');
    }

    function setBusy(busy) {
      exportBtn.disabled = busy;
      if (!busy) progressWrap.classList.remove('visible');
    }

    function setError(msg) {
      setStatus('❌ ' + msg, 'err');
      setBusy(false);
    }

    function repaint() {
      return new Promise(r => requestAnimationFrame(() => setTimeout(r, 0)));
    }

    function setProgress(done, total, label) {
      const pct = total > 0 ? Math.round((done / total) * 100) : 0;
      progressFill.style.width = pct + '%';
      if (label) progressLbl.textContent = label;
    }

    // ── Buttons ────────────────────────────────────────────────────────────────
    exportBtn.onclick = () => {
      setBusy(true);
      progressWrap.classList.add('visible');
      setProgress(0, 1, 'Starting…');
      setStatus('Exporting', 'exporting');
      parent.postMessage({ pluginMessage: { type: 'export-selection', scale: exportScale } }, '*');
    };

    markBtn.onclick = () => {
      parent.postMessage({ pluginMessage: { type: 'mark-precomp' } }, '*');
    };

    // ── Streaming queue ────────────────────────────────────────────────────────
    let queue = Promise.resolve();
    let totalGroups = 0, sentGroups = 0, exportedGroups = 0;

    function enqueue(fn) {
      queue = queue.then(fn).catch(e => setError(e.message));
    }

    async function post(body) {
      const res = await fetch(SERVER, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (!res.ok) throw new Error('Server error ' + res.status);
      return res.json();
    }

    // ── Plugin messages ────────────────────────────────────────────────────────
    onmessage = (event) => {
      const msg = event.data.pluginMessage;
      if (!msg) return;

      // Live selection state from plugin.
      if (msg.type === 'selection-info') {
        updateMarkBtn(msg.total, msg.marked);
        return;
      }

      if (msg.type === 'export-start') {
        totalGroups = msg.total || 1;
        sentGroups = exportedGroups = 0;
        queue = Promise.resolve();
        enqueue(() => post({ action: 'start', total: totalGroups, documentName: msg.documentName || 'Figma' }));
        return;
      }

      if (msg.type === 'export-progress') {
        exportedGroups++;
        setProgress(exportedGroups, totalGroups * 2, msg.message || 'Processing layers…');
        return;
      }

      if (msg.type === 'export-group') {
        const g = msg.group;
        enqueue(async () => {
          sentGroups++;
          setProgress(totalGroups + sentGroups - 0.5, totalGroups * 2, `Sending ${sentGroups}/${totalGroups}…`);
          await repaint();
          await post({ action: 'group', group: g });
          setProgress(totalGroups + sentGroups, totalGroups * 2);
          await repaint();
        });
        return;
      }

      if (msg.type === 'export-done') {
        enqueue(async () => {
          setProgress(totalGroups * 2, totalGroups * 2, 'Finalizing…');
          await repaint();
          await post({ action: 'finalize' });
          setStatus('✅ Ready in Companion!', 'ok');
          progressWrap.classList.remove('visible');
          exportBtn.disabled = false;
        });
        return;
      }

      if (msg.type === 'export-error') {
        setError(msg.message || 'Unknown error');
      }
    };
  </script>
</body>
</html>
